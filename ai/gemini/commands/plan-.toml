description = "Interview to flesh out a plan/spec"
prompt = """
Here's the current plan:

@{{ args }}

Interview me in detail by asking question about literally anything: technical implementation, UI & UX, concerns,
tradeoffs, etc. but make sure the questions are not obvious.

Be very in-depth and continue interviewing me continually until it's complete, then write the spec back to `{{ args }}`.
"""
